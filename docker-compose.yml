services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atmos
      POSTGRES_PASSWORD: atmos
      POSTGRES_DB: atmos
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atmos -d atmos"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://atmos:atmos@db:5432/atmos?schema=public
      JWT_SECRET: dev_secret_change_me_in_production
      PORT: "4000"
      NODE_ENV: development
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    # Исходники «запечены» в образ (COPY . .) — bind-mount НЕ используется, чтобы
    # не зависеть от нестабильного монтирования папки OneDrive на Windows.
    # Для разработки с hot reload см. docker-compose.dev.yml (проект вне OneDrive).
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma db seed && npm run dev"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    command: sh -c "npm run dev -- --host 0.0.0.0"

volumes:
  db_data:
