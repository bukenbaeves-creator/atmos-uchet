# Render Blueprint — web-сервис (API + фронтенд). База данных вынесена в Neon
# (persistent Postgres, не удаляется через 30 дней как free-БД Render).
# Подключение: Render Dashboard → New → Blueprint → выбрать этот репозиторий.
#
# Старая база Render `atmos-db` оставлена как резерв на переходный период —
# после проверки работы на Neon её можно удалить (и убрать блок databases ниже).
databases:
  - name: atmos-db
    databaseName: atmos
    user: atmos
    region: frankfurt
    plan: free # РЕЗЕРВ; приложение больше на неё не смотрит (см. DATABASE_URL)

services:
  - type: web
    name: atmos
    runtime: docker
    dockerfilePath: ./Dockerfile.prod
    region: frankfurt
    plan: free # free засыпает при простое; для клиники — платный
    healthCheckPath: /api/health
    envVars:
      # DATABASE_URL — строка подключения к Neon. Задаётся вручную в Render
      # Dashboard (Environment), в репозиторий секрет НЕ пишем.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true # Render сгенерирует секрет автоматически
      - key: NODE_ENV
        value: production
