# Render Blueprint — разворачивает Postgres + один web-сервис (API + фронтенд).
# Подключение: Render Dashboard → New → Blueprint → выбрать этот репозиторий.
databases:
  - name: atmos-db
    databaseName: atmos
    user: atmos
    region: frankfurt # ЕС; учитывайте требования к хранению ПДн
    plan: free # для продакшена смените на платный (free-БД временная)

services:
  - type: web
    name: atmos
    runtime: docker
    dockerfilePath: ./Dockerfile.prod
    region: frankfurt # тот же регион, что и БД (для internal-подключения)
    plan: free # free засыпает при простое; для клиники — платный
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atmos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render сгенерирует секрет автоматически
      - key: NODE_ENV
        value: production
